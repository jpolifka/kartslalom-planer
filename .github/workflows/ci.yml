name: CI

on:
  push:
    branches: [main, webeditor, "phase2/**", "phase3/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type-check & build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  security-smoke:
    runs-on: ubuntu-latest
    needs: build
    # Läuft nur wenn CI_SUPABASE_URL als Secret gesetzt ist (nicht bei Fork-PRs)
    if: vars.ENABLE_SECURITY_SMOKE == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security smoke tests
        run: npm run test:security
        env:
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
