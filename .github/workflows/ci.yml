name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type-check & build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

  # Läuft bei jedem Push/PR automatisch, ohne externe Secrets: der Stack wird
  # ephemer im Runner aufgesetzt (dieselben Docker-Skripte wie lokal) und nach
  # dem Job wieder verworfen. Kein dauerhaftes Test-Supabase-Projekt nötig.
  security-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Ephemeres Supabase-Test-Env erzeugen
        run: |
          cd docker/supabase
          cp .env.example .env
          sh utils/generate-keys.sh --update-env
          sed -i "s|^CRON_SECRET=.*$|CRON_SECRET=$(openssl rand -hex 16)|" .env

      - name: Preflight-Check
        run: (cd docker/supabase && sh preflight-check.sh)

      - name: Stack starten
        # docker-entrypoint-initdb.d/migrate.sh (siehe docker/supabase/docker-compose.yml)
        # wendet bei jeder frischen Postgres-Initialisierung automatisch alle
        # Migrationen aus supabase/migrations/ an -- ein separater
        # "apply-migrations.sh"-Schritt ist hier nicht noetig (und wuerde mit
        # veralteter LEGACY-Liste sogar fehlschlagen, siehe apply-migrations.sh).
        # Der Stack ist danach garantiert vollstaendig migriert.
        run: docker compose -f docker/docker-compose.dev.yml up -d --build --wait --wait-timeout 180

      - name: Security-Smoke-Tests
        run: sh docker/run-security-test-local.sh

      - name: Stack-Logs bei Fehlschlag
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml logs --tail=200

      - name: Stack stoppen
        if: always()
        run: docker compose -f docker/docker-compose.dev.yml down -v

  # Manueller Release-Testlauf: startet den kompletten self-hosted
  # Supabase-Stack ephemer im Runner (dieselben Docker-Skripte wie für die
  # lokale Entwicklung) und fährt Integration, Security-Smoke und E2E
  # dagegen. Braucht dafür keine externen Secrets/Test-Instanz -- der Stack
  # existiert nur für die Dauer dieses Jobs und wird danach verworfen.
  full-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Ephemeres Supabase-Test-Env erzeugen
        # Frische, zufällige Secrets pro Lauf statt der Demo-Werte aus
        # .env.example -- der Stack ist danach zwar trotzdem nur für diesen
        # Job erreichbar, aber preflight-check.sh (siehe nächster Schritt)
        # prüft damit reale Bedingungen statt eines Sonderfalls.
        # Muss vor der Compose-Validierung laufen: docker-compose.yml und
        # docker-compose.dev.yml binden supabase/.env per env_file ein --
        # ohne diese Datei schlägt "compose config" fehl.
        run: |
          cd docker/supabase
          cp .env.example .env
          sh utils/generate-keys.sh --update-env
          sed -i "s|^CRON_SECRET=.*$|CRON_SECRET=$(openssl rand -hex 16)|" .env

      - name: Preflight-Check
        run: (cd docker/supabase && sh preflight-check.sh)

      - name: Compose-Konfiguration validieren
        # VITE_SUPABASE_URL/-ANON_KEY sind Build-Args der Prod-Compose-Datei
        # (kein echter Zugriff nötig, config validiert nur die Struktur).
        env:
          VITE_SUPABASE_URL: http://localhost:8000
          VITE_SUPABASE_ANON_KEY: ci-placeholder
        run: |
          docker compose -f docker/docker-compose.yml config -q
          docker compose -f docker/docker-compose.dev.yml config -q

      - name: Stack starten
        # docker-entrypoint-initdb.d/migrate.sh (siehe docker/supabase/docker-compose.yml)
        # wendet bei jeder frischen Postgres-Initialisierung automatisch alle
        # Migrationen aus supabase/migrations/ an -- ein separater
        # "apply-migrations.sh"-Schritt ist hier nicht noetig (und wuerde mit
        # veralteter LEGACY-Liste sogar fehlschlagen, siehe apply-migrations.sh).
        # Der Stack ist danach garantiert vollstaendig migriert.
        run: docker compose -f docker/docker-compose.dev.yml up -d --build --wait --wait-timeout 180

      - name: Integrationstests
        run: sh docker/run-integration-test-local.sh

      - name: Security-Smoke-Tests
        run: sh docker/run-security-test-local.sh

      - name: Playwright E2E
        run: sh docker/run-playwright-local.sh

      - name: npm audit
        run: docker exec kartslalom-kartslalom-dev-1 npm audit --audit-level=high

      - name: Stack-Logs bei Fehlschlag
        if: failure()
        run: docker compose -f docker/docker-compose.dev.yml logs --tail=200

      - name: Stack stoppen
        if: always()
        run: docker compose -f docker/docker-compose.dev.yml down -v
