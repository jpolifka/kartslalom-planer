server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA-Routing: alle Pfade zur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets langfristig cachen (Vite versieht sie mit Content-Hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://server.arcgisonline.com; connect-src 'self' https://txctsskamonzvokgxvys.supabase.co wss://txctsskamonzvokgxvys.supabase.co http://localhost:8000 ws://localhost:8000; frame-ancestors 'none';" always;
}
